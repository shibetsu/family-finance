<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Finance</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/x-icon" href="fintool.ico" />
    <link href="FinTool.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" href="fintool_preview.png" />
</head>

<body>
    <div id="app">
        <style>
            #app-splash {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 28px;
                background: #f5f5f5;
                font-family: Inter, system-ui, -apple-system, sans-serif;
            }
            #app-splash-brand {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            #app-splash-brand img {
                width: 34px;
                height: 34px;
                object-fit: contain;
            }
            #app-splash-brand span {
                font-size: 20px;
                font-weight: 600;
                color: #0a0a0a;
                letter-spacing: -0.3px;
            }
            #app-splash-spinner {
                width: 28px;
                height: 28px;
                border: 2.5px solid #e0e0e0;
                border-top-color: #0a0a0a;
                border-radius: 50%;
                animation: splash-spin 0.75s linear infinite;
            }
            @keyframes splash-spin { to { transform: rotate(360deg); } }
        </style>
        <div id="app-splash">
            <div id="app-splash-brand">
                <img src="fintool_preview.png" alt="" />
                <span>Family Finance</span>
            </div>
            <div id="app-splash-spinner"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
</body>

</html>
